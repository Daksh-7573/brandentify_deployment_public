<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brandentifier - Professional Networking & AI-Powered Career Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="font-sans bg-gray-50 text-gray-800 min-h-screen">
  <!-- Minimal loading state - removed slow robot animation -->
  <div id="app-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, rgba(17, 24, 39, 0.9) 0%, rgba(0, 0, 0, 0.8) 50%, rgba(31, 41, 55, 0.9) 100%); z-index: 9999;">
    <!-- Minimal loading indicator -->
    <div style="display: flex; flex-direction: column; align-items: center; gap: 16px;">
      <!-- Simple spinner instead of heavy GIF -->
      <div style="width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <!-- Simplified message -->
      <div style="color: white; font-size: 16px; font-weight: 500; text-align: center; font-family: 'Inter', sans-serif;">Loading...</div>
    </div>
  </div>
  
  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- Remove the loader when the app loads -->
  <script>
    // Remove loader as soon as React starts mounting
    window.addEventListener('DOMContentLoaded', function() {
      // Hide loader immediately when React begins to load
      setTimeout(function() {
        var loader = document.getElementById('app-loader');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.2s ease-out';
          setTimeout(function() {
            loader.style.display = 'none';
          }, 200);
        }
      }, 100); // Minimal delay - just enough for DOM to be ready
    });
  </script>
</body>
</html>
