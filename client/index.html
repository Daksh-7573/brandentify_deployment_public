<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brandentifier - Professional Networking & AI-Powered Career Platform</title>
  
  <!-- Preconnect to critical domains for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://brandentifier-app.firebaseapp.com">
  <link rel="preconnect" href="https://firebase.googleapis.com">
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://lh3.googleusercontent.com">
  
  <!-- Preload critical resources -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" as="style">
  <link rel="preload" href="/src/main.tsx" as="script">
  
  <!-- Load fonts and styles -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="font-sans bg-gray-50 text-gray-800 min-h-screen">
  <!-- Fast skeleton loading state -->
  <div id="app-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(17, 24, 39, 0.9) 0%, rgba(0, 0, 0, 0.8) 50%, rgba(31, 41, 55, 0.9) 100%); z-index: 9999; overflow: hidden;">
    <!-- Header skeleton -->
    <div style="height: 64px; background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; padding: 0 24px;">
      <div style="width: 180px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 8px; animation: pulse 2s ease-in-out infinite;"></div>
      <div style="display: flex; gap: 12px;">
        <div style="width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; animation: pulse 2s ease-in-out infinite;"></div>
        <div style="width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; animation: pulse 2s ease-in-out infinite;"></div>
        <div style="width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; animation: pulse 2s ease-in-out infinite;"></div>
      </div>
    </div>
    
    <!-- Main content skeleton -->
    <div style="padding: 24px; max-width: 1200px; margin: 0 auto;">
      <!-- Feed skeleton -->
      <div style="display: flex; flex-direction: column; gap: 24px;">
        <!-- Card 1 -->
        <div style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px;">
          <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
            <div style="width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; animation: pulse 2s ease-in-out infinite;"></div>
            <div style="flex: 1;">
              <div style="width: 120px; height: 16px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-bottom: 4px; animation: pulse 2s ease-in-out infinite;"></div>
              <div style="width: 80px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 4px; animation: pulse 2s ease-in-out infinite;"></div>
            </div>
          </div>
          <div style="width: 100%; height: 16px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-bottom: 8px; animation: pulse 2s ease-in-out infinite;"></div>
          <div style="width: 80%; height: 16px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-bottom: 8px; animation: pulse 2s ease-in-out infinite;"></div>
          <div style="width: 60%; height: 16px; background: rgba(255,255,255,0.1); border-radius: 4px; animation: pulse 2s ease-in-out infinite;"></div>
        </div>
        
        <!-- Card 2 -->
        <div style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px;">
          <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
            <div style="width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; animation: pulse 2s ease-in-out infinite;"></div>
            <div style="flex: 1;">
              <div style="width: 120px; height: 16px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-bottom: 4px; animation: pulse 2s ease-in-out infinite;"></div>
              <div style="width: 80px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 4px; animation: pulse 2s ease-in-out infinite;"></div>
            </div>
          </div>
          <div style="width: 100%; height: 16px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-bottom: 8px; animation: pulse 2s ease-in-out infinite;"></div>
          <div style="width: 75%; height: 16px; background: rgba(255,255,255,0.1); border-radius: 4px; animation: pulse 2s ease-in-out infinite;"></div>
        </div>
      </div>
    </div>
  </div>
  
  <style>
    /* Inline critical CSS for fastest first paint */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Critical skeleton styles for smooth loading */
    .skeleton-container {
      background: linear-gradient(135deg, rgba(17, 24, 39, 0.9) 0%, rgba(0, 0, 0, 0.8) 50%, rgba(31, 41, 55, 0.9) 100%);
      min-height: 100vh;
    }
    
    .skeleton-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    
    .skeleton-element {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    /* Font display optimization */
    @font-face {
      font-family: 'Inter';
      font-display: swap;
    }
  </style>
  
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- Register Service Worker for App Shell Caching -->
  <script>
    // Performance measurement
    window.__performance_start = performance.now();
    
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .then(function(registration) {
            console.log('[SW] Registration successful:', registration.scope);
            console.log('[PERF] Service Worker registered in', (performance.now() - window.__performance_start).toFixed(2), 'ms');
          })
          .catch(function(error) {
            console.log('[SW] Registration failed:', error);
            // Try to register from client directory
            navigator.serviceWorker.register('./sw.js')
              .then(function(registration) {
                console.log('[SW] Registration successful (fallback):', registration.scope);
              })
              .catch(function(fallbackError) {
                console.log('[SW] Fallback registration also failed:', fallbackError);
              });
          });
      });
    }
    
    // Measure and report total loading time
    window.addEventListener('load', function() {
      const totalTime = performance.now() - window.__performance_start;
      console.log(`[PERF] Total page load time: ${totalTime.toFixed(2)}ms`);
      
      // Report optimization benefits
      if (window.__brandentifier_cached_auth) {
        console.log('[PERF] ✅ Firebase auth caching active');
      }
      if (document.querySelectorAll('link[rel="preconnect"]').length > 0) {
        console.log('[PERF] ✅ Preconnect optimization active');
      }
      if (document.querySelectorAll('link[rel="preload"]').length > 0) {
        console.log('[PERF] ✅ Preload optimization active');
      }
    });
  </script>
  
  <!-- Remove the loader when the app loads -->
  <script>
    // Remove loader as soon as React starts mounting
    window.addEventListener('DOMContentLoaded', function() {
      // Hide loader immediately when React begins to load
      setTimeout(function() {
        var loader = document.getElementById('app-loader');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.2s ease-out';
          setTimeout(function() {
            loader.style.display = 'none';
          }, 200);
        }
      }, 100); // Minimal delay - just enough for DOM to be ready
    });
  </script>
</body>
</html>
