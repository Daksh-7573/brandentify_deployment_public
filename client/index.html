<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brandentifier - Professional Networking & AI-Powered Career Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="font-sans bg-gray-50 text-gray-800 min-h-screen">
  <!-- Pre-render loading state that appears before React even loads -->
  <div id="app-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #f9fafb; z-index: 9999;">
    <!-- Skeleton card loader that matches the one used in the React app -->
    <div style="width: 280px; height: 490px; aspect-ratio: 2/3.5; overflow: hidden; border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);">
      <div style="height: 24%; background-color: #e5e7eb; position: relative; animation: pulse 2s infinite ease-in-out;"></div>
      <div style="background-color: white; height: 76%; display: flex; flex-direction: column; gap: 16px; padding: 20px;">
        <div style="height: 20px; width: 70%; background-color: #e5e7eb; border-radius: 4px; animation: pulse 2s infinite ease-in-out;"></div>
        <div style="height: 16px; width: 50%; background-color: #e5e7eb; border-radius: 4px; animation: pulse 2s infinite ease-in-out;"></div>
        <div style="height: 100px; width: 100%; background-color: #e5e7eb; border-radius: 4px; animation: pulse 2s infinite ease-in-out;"></div>
        <div style="height: 16px; width: 80%; background-color: #e5e7eb; border-radius: 4px; animation: pulse 2s infinite ease-in-out;"></div>
        <div style="height: 16px; width: 60%; background-color: #e5e7eb; border-radius: 4px; animation: pulse 2s infinite ease-in-out;"></div>
      </div>
    </div>
  </div>
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
  
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- Remove the loader when the app loads -->
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      // The app has started loading, but we'll keep the loader for a bit
      
      // Once the React app is mounted and rendered
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('app-loader');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s ease-out';
            setTimeout(function() {
              loader.style.display = 'none';
            }, 300);
          }
        }, 200); // Small delay to ensure React has time to initialize
      });
    });
  </script>
</body>
</html>
