<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brandentifier - Professional Networking & AI-Powered Career Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="font-sans bg-gray-50 text-gray-800 min-h-screen">
  <!-- Static content that will always be visible, even if React fails to load -->
  <div id="static-content" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #ffffff; z-index: 9998;">
    <h1 style="color: #0066cc; font-size: 24px; margin-bottom: 20px;">Brandentifier</h1>
    <p style="color: #333; font-size: 16px; max-width: 400px; text-align: center; margin-bottom: 20px;">
      If you're seeing this message for more than a few seconds, the application might be having trouble loading.
    </p>
    <div style="background-color: #f0f4f8; padding: 15px; border-radius: 8px; max-width: 400px; margin-bottom: 20px;">
      <p style="color: #333; font-size: 14px; margin: 0;">
        Status: Waiting for React to initialize...
      </p>
    </div>
    <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #0066cc; border-radius: 50%; animation: spin 1s linear infinite;"></div>
  </div>
  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
  
  <!-- Pre-render loading state that appears before React even loads -->
  <div id="app-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #f9fafb; z-index: 9999;">
    <!-- Skeleton card loader that matches the one used in the React app -->
    <div style="width: 280px; height: 490px; aspect-ratio: 2/3.5; overflow: hidden; border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);">
      <div style="height: 24%; background-color: #e5e7eb; position: relative; animation: pulse 2s infinite ease-in-out;"></div>
      <div style="background-color: white; height: 76%; display: flex; flex-direction: column; gap: 16px; padding: 20px;">
        <div style="height: 20px; width: 70%; background-color: #e5e7eb; border-radius: 4px; animation: pulse 2s infinite ease-in-out;"></div>
        <div style="height: 16px; width: 50%; background-color: #e5e7eb; border-radius: 4px; animation: pulse 2s infinite ease-in-out;"></div>
        <div style="height: 100px; width: 100%; background-color: #e5e7eb; border-radius: 4px; animation: pulse 2s infinite ease-in-out;"></div>
        <div style="height: 16px; width: 80%; background-color: #e5e7eb; border-radius: 4px; animation: pulse 2s infinite ease-in-out;"></div>
        <div style="height: 16px; width: 60%; background-color: #e5e7eb; border-radius: 4px; animation: pulse 2s infinite ease-in-out;"></div>
      </div>
    </div>
  </div>
  
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- Debug logging and error handling -->
  <script>
    console.log('HTML document started loading at', new Date().toISOString());
    
    // Log any unhandled exceptions
    window.addEventListener('error', function(event) {
      console.error('Unhandled error:', event.error || event.message);
      
      // Update static content to show error
      const staticContent = document.getElementById('static-content');
      if (staticContent) {
        const statusElement = staticContent.querySelector('p:nth-child(3)');
        if (statusElement) {
          statusElement.innerHTML = '<span style="color: red;">Error: ' + 
            (event.error?.message || event.message || 'Unknown error occurred') + '</span>';
        }
      }
    });
    
    // Log any unhandled promise rejections
    window.addEventListener('unhandledrejection', function(event) {
      console.error('Unhandled promise rejection:', event.reason);
      
      // Update static content to show error
      const staticContent = document.getElementById('static-content');
      if (staticContent) {
        const statusElement = staticContent.querySelector('p:nth-child(3)');
        if (statusElement) {
          statusElement.innerHTML = '<span style="color: red;">Error: Promise rejected - ' + 
            (event.reason?.message || event.reason || 'Unknown reason') + '</span>';
        }
      }
    });
    
    window.addEventListener('DOMContentLoaded', function() {
      console.log('DOM content loaded at', new Date().toISOString());
      
      // Update static content
      const staticContent = document.getElementById('static-content');
      if (staticContent) {
        const statusElement = staticContent.querySelector('p:nth-child(3)');
        if (statusElement) {
          statusElement.innerHTML = '<span style="color: #333;">Status: DOM loaded, waiting for React...</span>';
        }
      }
      
      // Start a timeout to detect if React doesn't load
      window.reactLoadTimeout = setTimeout(function() {
        console.warn('React app did not load within 10 seconds');
        
        // Show static content permanently if React doesn't load
        const appLoader = document.getElementById('app-loader');
        if (appLoader) {
          appLoader.style.display = 'none';
        }
        
        const staticContent = document.getElementById('static-content');
        if (staticContent) {
          const statusElement = staticContent.querySelector('p:nth-child(3)');
          if (statusElement) {
            statusElement.innerHTML = '<span style="color: red;">Status: React app failed to load after 10 seconds</span>';
          }
        }
      }, 10000);
      
      // Once the React app is mounted and rendered
      window.addEventListener('load', function() {
        console.log('Window load event fired at', new Date().toISOString());
        
        // Clear the timeout since the window loaded
        if (window.reactLoadTimeout) {
          clearTimeout(window.reactLoadTimeout);
        }
        
        // Update static content
        const staticContent = document.getElementById('static-content');
        if (staticContent) {
          const statusElement = staticContent.querySelector('p:nth-child(3)');
          if (statusElement) {
            statusElement.innerHTML = '<span style="color: green;">Status: Window loaded!</span>';
          }
        }
        
        setTimeout(function() {
          // Check if React rendered anything in the root
          const root = document.getElementById('root');
          const rootHasContent = root && (root.children.length > 0 || root.innerHTML.trim() !== '');
          
          console.log('Root has content:', rootHasContent);
          
          if (rootHasContent) {
            // React appears to have rendered something
            var loader = document.getElementById('app-loader');
            if (loader) {
              loader.style.opacity = '0';
              loader.style.transition = 'opacity 0.3s ease-out';
              setTimeout(function() {
                loader.style.display = 'none';
              }, 300);
            }
            
            // Hide static content too
            var staticContent = document.getElementById('static-content');
            if (staticContent) {
              staticContent.style.opacity = '0';
              staticContent.style.transition = 'opacity 0.3s ease-out';
              setTimeout(function() {
                staticContent.style.display = 'none';
              }, 300);
            }
          } else {
            // React did not render anything
            console.error('React did not render any content in root element');
            
            // Keep static content visible and update status
            const staticContent = document.getElementById('static-content');
            if (staticContent) {
              const statusElement = staticContent.querySelector('p:nth-child(3)');
              if (statusElement) {
                statusElement.innerHTML = '<span style="color: red;">Status: React initialized but did not render any content</span>';
              }
            }
            
            // Hide the loader
            var loader = document.getElementById('app-loader');
            if (loader) {
              loader.style.display = 'none';
            }
          }
        }, 500); // Small delay to ensure React has time to initialize
      });
    });
  </script>
</body>
</html>
