<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brandentifier - Professional Networking & AI-Powered Career Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="font-sans bg-gray-50 text-gray-800 min-h-screen">
  <!-- Pre-render loading state with cute robot animation -->
  <div id="app-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, rgba(17, 24, 39, 0.8) 0%, rgba(0, 0, 0, 0.7) 50%, rgba(31, 41, 55, 0.8) 100%); backdrop-filter: blur(8px); z-index: 9999;">
    <!-- Cute robot loading animation -->
    <div style="display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 48px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 16px; backdrop-filter: blur(16px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);">
      <!-- Robot animation -->
      <img src="/Contact Candour_1753488336182.gif" alt="Loading robot" style="width: 120px; height: 120px; object-fit: contain;"/>
      <!-- Welcome message -->
      <div style="color: white; font-size: 24px; font-weight: 600; text-align: center; font-family: 'Inter', sans-serif;">Welcome to Brandentifier</div>
    </div>
  </div>
  
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- Remove the loader when the app loads -->
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      // The app has started loading, but we'll keep the loader for a bit
      
      // Once the React app is mounted and rendered
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('app-loader');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s ease-out';
            setTimeout(function() {
              loader.style.display = 'none';
            }, 300);
          }
        }, 200); // Small delay to ensure React has time to initialize
      });
    });
  </script>
</body>
</html>
