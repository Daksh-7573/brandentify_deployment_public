<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brandentifier - Professional Networking & AI-Powered Career Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="font-sans bg-gray-50 text-gray-800 min-h-screen">
  <!-- Pre-render loading state that appears before React even loads -->
  <div id="app-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #f9fafb; z-index: 9999;">
    <div style="width: 48px; height: 48px; border-radius: 50%; border: 3px solid #e5e7eb; border-top-color: #3b82f6; animation: loader-spin 1s linear infinite;">
    </div>
  </div>
  <style>
    @keyframes loader-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- Remove the loader when the app loads -->
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      // The app has started loading, but we'll keep the loader for a bit
      
      // Once the React app is mounted and rendered
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('app-loader');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s ease-out';
            setTimeout(function() {
              loader.style.display = 'none';
            }, 300);
          }
        }, 200); // Small delay to ensure React has time to initialize
      });
    });
  </script>
</body>
</html>
