<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="roomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F0F4FF" />
    </linearGradient>
    <!-- Soft shadow for depth -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="1600" height="900" fill="url(#roomGradient)" />
  
  <!-- Wall details -->
  <rect x="0" y="0" width="1600" height="600" fill="#FFFFFF" />
  
  <!-- Floor -->
  <rect x="0" y="600" width="1600" height="300" fill="#F9FAFF" />
  <line x1="0" y1="600" x2="1600" y2="600" stroke="#EAEEF9" stroke-width="2" />
  
  <!-- Wall paneling -->
  <rect x="100" y="50" width="1400" height="500" rx="2" fill="#FCFDFF" filter="url(#softShadow)" />
  <rect x="150" y="100" width="1300" height="400" rx="2" fill="#F7F9FF" filter="url(#softShadow)" />
  
  <!-- Subtle wall lines -->
  <line x1="400" y1="0" x2="400" y2="600" stroke="#F0F4FF" stroke-width="1" />
  <line x1="800" y1="0" x2="800" y2="600" stroke="#F0F4FF" stroke-width="1" />
  <line x1="1200" y1="0" x2="1200" y2="600" stroke="#F0F4FF" stroke-width="1" />
  
  <!-- Floor grid lines -->
  <line x1="0" y1="700" x2="1600" y2="700" stroke="#F0F2F8" stroke-width="1" />
  <line x1="0" y1="800" x2="1600" y2="800" stroke="#F0F2F8" stroke-width="1" />
  
  <!-- Corner light effects -->
  <circle cx="0" cy="0" r="300" fill="url(#roomGradient)" opacity="0.5" />
  <circle cx="1600" cy="0" r="300" fill="url(#roomGradient)" opacity="0.5" />
  
  <!-- Subtle patterns for texture -->
  <g opacity="0.05">
    <rect x="0" y="0" width="100%" height="100%" fill="white" />
    <path d="M0 0h10v10H0z" fill="#E5E9F5" />
    <path d="M50 50h10v10H50z" fill="#E5E9F5" />
    <path d="M100 100h10v10h-10z" fill="#E5E9F5" />
    <path d="M150 150h10v10h-10z" fill="#E5E9F5" />
    <path d="M200 200h10v10h-10z" fill="#E5E9F5" />
  </g>
</svg>