<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Auth Test - Direct</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        
        button {
            background: #4285f4;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
        
        button:hover {
            background: #3367d6;
        }
        
        #status {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            white-space: pre-line;
            font-family: monospace;
        }
        
        .success { color: #4caf50; }
        .error { color: #f44336; }
        .info { color: #2196f3; }
    </style>
</head>
<body>
    <h1>Firebase Authentication Test</h1>
    <p>Direct Firebase authentication test without React components</p>
    
    <button onclick="testPopupAuth()">Test Popup Authentication</button>
    <button onclick="testRedirectAuth()">Test Redirect Authentication</button>
    <button onclick="testConfig()">Test Firebase Config</button>
    <button onclick="clearStatus()">Clear Status</button>
    
    <div id="status">Ready to test authentication...</div>

    <!-- Firebase SDK -->
    <script type="module">
        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { 
            getAuth, 
            GoogleAuthProvider, 
            signInWithPopup, 
            signInWithRedirect, 
            getRedirectResult,
            onAuthStateChanged 
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        // Get environment variables from Replit
        const apiKey = window.location.hostname.includes('replit') 
            ? 'AIzaSyDlvl5iqFRGSJNsA-Ly7nryFrxDPyZsGjY' // Development key for Replit testing
            : (window.FIREBASE_API_KEY || 'FIREBASE_API_KEY_NOT_SET'); // Use env var in production
        const projectId = "brandentifier-8b9c3"; // Your project ID
        const appId = "1:486486123456:web:abcd1234efgh5678"; // Your app ID
        
        const firebaseConfig = {
            apiKey: apiKey,
            authDomain: `${projectId}.firebaseapp.com`,
            projectId: projectId,
            storageBucket: `${projectId}.firebasestorage.app`,
            messagingSenderId: "486486123456",
            appId: appId
        };

        let app, auth, provider;
        
        // Initialize Firebase
        function initFirebase() {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                provider = new GoogleAuthProvider();
                provider.addScope('email');
                provider.addScope('profile');
                
                log('✅ Firebase initialized successfully', 'success');
                log(`Project: ${projectId}`, 'info');
                log(`Auth Domain: ${projectId}.firebaseapp.com`, 'info');
                
                // Listen for auth state changes
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        log(`🎉 User signed in: ${user.email}`, 'success');
                        log(`Display Name: ${user.displayName}`, 'info');
                        log(`UID: ${user.uid}`, 'info');
                    } else {
                        log('User signed out', 'info');
                    }
                });
                
                return true;
            } catch (error) {
                log(`❌ Firebase initialization failed: ${error.message}`, 'error');
                return false;
            }
        }

        // Test popup authentication
        window.testPopupAuth = async function() {
            log('🚀 Testing popup authentication...', 'info');
            
            if (!auth || !provider) {
                if (!initFirebase()) return;
            }
            
            try {
                provider.setCustomParameters({
                    prompt: 'select_account'
                });
                
                const result = await signInWithPopup(auth, provider);
                
                if (result && result.user) {
                    log('🎉 Popup authentication successful!', 'success');
                    log(`Email: ${result.user.email}`, 'success');
                    log(`Name: ${result.user.displayName}`, 'success');
                    
                    // Test redirect to Industry Pulse
                    setTimeout(() => {
                        log('Redirecting to Industry Pulse...', 'info');
                        window.location.href = '/industry-pulse';
                    }, 2000);
                } else {
                    log('❌ No user returned from popup', 'error');
                }
                
            } catch (error) {
                log(`❌ Popup authentication failed: ${error.code}`, 'error');
                log(`Error message: ${error.message}`, 'error');
                
                if (error.code === 'auth/popup-blocked') {
                    log('💡 Solution: Enable popups for this domain', 'info');
                } else if (error.code === 'auth/popup-closed-by-user') {
                    log('💡 Popup was closed before completing authentication', 'info');
                    log('💡 Trying redirect authentication...', 'info');
                    await testRedirectAuth();
                }
            }
        };

        // Test redirect authentication
        window.testRedirectAuth = async function() {
            log('🚀 Testing redirect authentication...', 'info');
            
            if (!auth || !provider) {
                if (!initFirebase()) return;
            }
            
            try {
                await signInWithRedirect(auth, provider);
                log('Redirecting to Google...', 'info');
            } catch (error) {
                log(`❌ Redirect authentication failed: ${error.code}`, 'error');
                log(`Error message: ${error.message}`, 'error');
            }
        };

        // Test Firebase configuration
        window.testConfig = function() {
            log('🔍 Testing Firebase configuration...', 'info');
            
            log(`API Key: ${apiKey ? 'Present' : 'Missing'}`, apiKey ? 'success' : 'error');
            log(`Project ID: ${projectId || 'Missing'}`, projectId ? 'success' : 'error');
            log(`App ID: ${appId ? 'Present' : 'Missing'}`, appId ? 'success' : 'error');
            
            log(`Current domain: ${window.location.hostname}`, 'info');
            log(`Protocol: ${window.location.protocol}`, 'info');
            log(`Is HTTPS: ${window.location.protocol === 'https:'}`, 'info');
            
            initFirebase();
        };

        // Clear status
        window.clearStatus = function() {
            document.getElementById('status').innerHTML = 'Status cleared...';
        };

        // Logger function
        function log(message, type = 'info') {
            const status = document.getElementById('status');
            const timestamp = new Date().toLocaleTimeString();
            const className = type;
            status.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
            status.scrollTop = status.scrollHeight;
            console.log(`[${timestamp}] ${message}`);
        }

        // Check for redirect result on page load
        window.addEventListener('load', async () => {
            log('Page loaded, checking for redirect result...', 'info');
            
            if (initFirebase()) {
                try {
                    const result = await getRedirectResult(auth);
                    if (result && result.user) {
                        log('🎉 Redirect result found!', 'success');
                        log(`Email: ${result.user.email}`, 'success');
                        
                        setTimeout(() => {
                            log('Redirecting to Industry Pulse...', 'info');
                            window.location.href = '/industry-pulse';
                        }, 2000);
                    } else {
                        log('No redirect result found', 'info');
                    }
                } catch (error) {
                    log(`Error checking redirect result: ${error.message}`, 'error');
                }
            }
        });

        // Make functions available globally
        window.log = log;
    </script>
</body>
</html>
