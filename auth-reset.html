<!DOCTYPE html>
<html>
<head>
    <title>Authentication Reset</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .container { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 { 
            text-align: center; 
            margin-bottom: 20px; 
            color: #2d3748;
            font-size: 28px;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.5;
        }
        .action-card {
            background: #f7fafc;
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
            border-left: 4px solid #4299e1;
        }
        .action-title {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
            font-size: 18px;
        }
        .action-desc {
            color: #718096;
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.4;
        }
        button { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            padding: 12px 24px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            width: 100%;
        }
        button:hover { 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .emergency { 
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .emergency:hover {
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
        }
        .status { 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 8px; 
            font-size: 14px;
        }
        .success { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }
        .info { background: #ebf8ff; border: 1px solid #90cdf4; color: #2c5282; }
        .warning { background: #fffbeb; border: 1px solid #f6e05e; color: #744210; }
        #results { margin-top: 20px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Authentication Reset</h1>
        <div class="subtitle">Clear old authentication data and get a fresh start</div>
        
        <div class="action-card">
            <div class="action-title">Step 1: Clear Authentication Data</div>
            <div class="action-desc">Remove all old redirect attempts and cached auth data</div>
            <button onclick="clearAuthData()">Clear All Auth Data</button>
        </div>
        
        <div class="action-card">
            <div class="action-title">Step 2: Direct App Access</div>
            <div class="action-desc">Go directly to the app without authentication requirements</div>
            <button onclick="directAccess()" class="emergency">Access Industry Pulse</button>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = `${message}`;
            document.getElementById('results').appendChild(div);
        }

        function clearAuthData() {
            addResult("Clearing authentication data...", "info");
            
            let cleared = 0;
            
            // Clear localStorage
            const localKeys = ['firebase_user', 'authSuccess', 'redirect_auth_attempt', 'redirect_auth_success', 'redirect_auth_time'];
            localKeys.forEach(key => {
                if (localStorage.getItem(key)) {
                    localStorage.removeItem(key);
                    cleared++;
                }
            });
            
            // Clear sessionStorage  
            const sessionKeys = ['redirect_auth_attempt', 'redirect_auth_success', 'redirect_auth_time', 'authSuccess'];
            sessionKeys.forEach(key => {
                if (sessionStorage.getItem(key)) {
                    sessionStorage.removeItem(key);
                    cleared++;
                }
            });
            
            // Clear any Firebase-related items
            Object.keys(localStorage).forEach(key => {
                if (key.includes('firebase') || key.includes('auth') || key.includes('redirect')) {
                    localStorage.removeItem(key);
                    cleared++;
                }
            });
            
            Object.keys(sessionStorage).forEach(key => {
                if (key.includes('firebase') || key.includes('auth') || key.includes('redirect')) {
                    sessionStorage.removeItem(key);
                    cleared++;
                }
            });
            
            // Clear cookies
            document.cookie.split(";").forEach(function(c) { 
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
            });
            
            addResult(`Authentication data cleared (${cleared} items removed)`, "success");
            addResult("You can now try logging in with Google again", "info");
        }
        
        function directAccess() {
            addResult("Setting up direct access...", "info");
            localStorage.setItem('emergency_access', 'true');
            sessionStorage.setItem('bypass_auth', 'true');
            addResult("Redirecting to Industry Pulse...", "success");
            setTimeout(() => {
                window.location.href = '/industry-pulse';
            }, 500);
        }
        
        // Auto-clear on load
        window.addEventListener('load', () => {
            addResult("Authentication reset tool loaded", "info");
        });
    </script>
</body>
</html>
