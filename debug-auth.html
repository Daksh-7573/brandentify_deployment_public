<!DOCTYPE html>
<html>
<head>
    <title>Authentication Debug</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a1a; color: white; }
        .log { margin: 5px 0; padding: 10px; background: #333; border-radius: 5px; }
        .success { background: #2d5a2d; }
        .error { background: #5a2d2d; }
        .info { background: #2d4a5a; }
        button { padding: 10px 20px; background: #4285f4; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Brandentifier Authentication Debug</h1>
    <button onclick="testAuth()">Test Google Authentication</button>
    <button onclick="checkAuthState()">Check Current Auth State</button>
    <button onclick="clearLogs()">Clear Logs</button>
    
    <div id="logs"></div>
    
    <script>
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logDiv = document.createElement('div');
            logDiv.className = `log ${type}`;
            logDiv.innerHTML = `[${timestamp}] ${message}`;
            document.getElementById('logs').appendChild(logDiv);
            console.log(`[${timestamp}] ${message}`);
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }
        
        function testAuth() {
            log('Starting authentication test...', 'info');
            
            // Open auth page in new window
            const authWindow = window.open('http://localhost:5000/', 'auth', 'width=800,height=600');
            
            // Listen for auth completion
            const checkAuth = setInterval(() => {
                try {
                    if (authWindow.closed) {
                        log('Auth window closed', 'info');
                        clearInterval(checkAuth);
                        checkAuthState();
                    }
                } catch (e) {
                    // Cross-origin error, window still open
                }
            }, 1000);
        }
        
        function checkAuthState() {
            log('Checking authentication state...', 'info');
            
            fetch('http://localhost:5000/api/auth/status')
                .then(response => response.json())
                .then(data => {
                    if (data.authenticated) {
                        log(`User authenticated: ${data.user?.name || 'Unknown'}`, 'success');
                        log(`Email: ${data.user?.email || 'No email'}`, 'success');
                    } else {
                        log('User not authenticated', 'error');
                    }
                })
                .catch(error => {
                    log(`Auth check failed: ${error.message}`, 'error');
                });
        }
        
        // Auto-check auth state on load
        window.onload = () => {
            log('Authentication debugger loaded', 'info');
            checkAuthState();
        };
    </script>
</body>
</html>
