<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Update Test</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.5;
        }
        pre {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .success {
            color: #22863a;
            font-weight: bold;
        }
        .error {
            color: #cb2431;
            font-weight: bold;
        }
        .warning {
            color: #b08800;
            font-weight: bold;
        }
        button {
            padding: 10px 15px;
            background-color: #0366d6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #035cc1;
        }
        .log-container {
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            height: 500px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>User Update Testing Tool</h1>
    <p>This tool tests the profile update functionality by directly accessing the API endpoints.</p>
    
    <button id="runTestBtn">Run Update Test</button>
    
    <div class="log-container" id="logContainer"></div>
    
    <script>
        const userId = 1; // Test with user ID 1
        const testData = {
            name: "Updated Test User",
            title: "Senior Software Developer",
            aboutMe: "Updated profile with test script",
            location: "San Francisco, CA",
            industry: "Software",
            whatIOffer: "Test offer content updated via direct API test",
            _timestamp: Date.now() // Add timestamp to bust cache
        };
        
        function log(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const logEntry = document.createElement('div');
            
            if (typeof message === 'object') {
                message = JSON.stringify(message, null, 2);
                logEntry.innerHTML = `<pre>${message}</pre>`;
            } else {
                if (type === 'success') {
                    logEntry.innerHTML = `<span class="success">${message}</span>`;
                } else if (type === 'error') {
                    logEntry.innerHTML = `<span class="error">${message}</span>`;
                } else if (type === 'warning') {
                    logEntry.innerHTML = `<span class="warning">${message}</span>`;
                } else {
                    logEntry.textContent = message;
                }
            }
            
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
            console.log(message);
        }
        
        async function testUserUpdate() {
            log("Starting user update test...");
            
            try {
                // First get current user data
                log(`Fetching current data for user ID: ${userId}`);
                const getUserResponse = await fetch(`/api/users/${userId}`);
                if (!getUserResponse.ok) {
                    throw new Error(`Failed to get user: ${getUserResponse.status} ${getUserResponse.statusText}`);
                }
                const currentUser = await getUserResponse.json();
                log("Current user data:", 'info');
                log(currentUser);
                
                // Now update the user
                log(`Updating user ID: ${userId} with data:`, 'info');
                log(testData);
                
                const updateResponse = await fetch(`/api/users/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testData)
                });
                
                if (!updateResponse.ok) {
                    throw new Error(`Failed to update user: ${updateResponse.status} ${updateResponse.statusText}`);
                }
                
                const updatedUser = await updateResponse.json();
                log("Update response:", 'info');
                log(updatedUser);
                
                // Verify the changes by getting the user again
                log("Verifying changes with fresh fetch...");
                const verifyResponse = await fetch(`/api/users/${userId}?_=${Date.now()}`);
                if (!verifyResponse.ok) {
                    throw new Error(`Failed to verify user: ${verifyResponse.status} ${verifyResponse.statusText}`);
                }
                
                const verifiedUser = await verifyResponse.json();
                log("Verified user data:", 'info');
                log(verifiedUser);
                
                // Check if the changes took effect
                const successFields = [];
                const failedFields = [];
                
                Object.entries(testData).forEach(([key, value]) => {
                    if (key === '_timestamp') return; // Skip the timestamp field
                    
                    if (verifiedUser[key] === value) {
                        successFields.push(key);
                    } else {
                        failedFields.push(`${key}: expected "${value}", got "${verifiedUser[key]}"`);
                    }
                });
                
                if (failedFields.length === 0) {
                    log(`✅ SUCCESS: All fields updated correctly: ${successFields.join(", ")}`, 'success');
                } else {
                    log("⚠️ PARTIAL UPDATE: Some fields were not updated correctly", 'warning');
                    log(`  - Successful fields: ${successFields.join(", ")}`, 'success');
                    log(`  - Failed fields: ${failedFields.join("\n  - ")}`, 'warning');
                }
                
            } catch (error) {
                log(`❌ ERROR: ${error}`, 'error');
            }
        }
        
        document.getElementById('runTestBtn').addEventListener('click', testUserUpdate);
    </script>
</body>
</html>
