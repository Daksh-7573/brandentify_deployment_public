<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Firebase Authentication Callback</title>
  <script>
    // This file handles direct access to the auth callback URL
    // It's a fallback in case the router doesn't correctly handle the route
    // It will pass along the URL parameters to our SPA route
    (function() {
      // Log the URL for debugging
      console.log('Static auth-callback.html loaded at:', window.location.href);
      
      // Get the current URL and extract the query string
      const queryString = window.location.search;
      
      // Store debug info
      try {
        localStorage.setItem('static_auth_callback_debug_url', window.location.href);
        localStorage.setItem('static_auth_callback_debug_time', new Date().toISOString());
      } catch (e) {
        console.error('Could not save debug info to localStorage:', e);
      }
      
      // Create JavaScript to inject our auth state into the app
      // This helps with the case where a static HTML page loads but then
      // React takes over and doesn't have access to the original URL params
      const script = document.createElement('script');
      script.textContent = `
        // Store auth parameters in sessionStorage so the app can retrieve them
        try {
          sessionStorage.setItem('firebase_auth_params', '${queryString}');
          sessionStorage.setItem('firebase_auth_callback_time', '${new Date().toISOString()}');
        } catch (e) {
          console.error('Could not store auth params:', e);
        }
      `;
      document.head.appendChild(script);
      
      // Redirect to our SPA route with the same parameters
      const redirectTarget = `/auth-callback${queryString}`;
      console.log('Redirecting to SPA route:', redirectTarget);
      
      // Wait a moment to let the above script run
      setTimeout(() => {
        window.location.href = redirectTarget;
      }, 100);
    })();
  </script>
</head>
<body>
  <h1>Authentication Processing</h1>
  <p>Please wait while we complete your authentication...</p>
  <p>If you are not redirected automatically, <a href="/">return to home</a>.</p>
  
  <script>
    // Display some debug info on the page
    document.body.innerHTML += `
      <div style="margin-top: 20px; padding: 10px; border: 1px solid #ccc; font-family: monospace; font-size: 12px;">
        <p>Current URL: ${window.location.href}</p>
        <p>Hostname: ${window.location.hostname}</p>
        <p>Timestamp: ${new Date().toISOString()}</p>
      </div>
    `;
  </script>
</body>
</html>
