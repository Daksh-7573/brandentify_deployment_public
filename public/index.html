<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brandentifier - Professional Development Platform</title>
    <style>
        body {
            margin: 0;
            padding: 2rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 { font-size: 3rem; margin-bottom: 1rem; }
        p { font-size: 1.2rem; margin-bottom: 2rem; }
        .status { background: rgba(255,255,255,0.2); padding: 1rem; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>🚀 Brandentifier Platform</h1>
    <p>AI-Powered Professional Development Platform</p>
    <div class="status">
        <h2>✅ Server Status: Running</h2>
        <p>Port: 5000 | Time: <span id="time"></span></p>
        <p>The application is working correctly.</p>
        <p>This is a Replit preview interface issue, not a server problem.</p>
    </div>
    
    <script>
        document.getElementById('time').textContent = new Date().toLocaleTimeString();
        console.log('Brandentifier platform loaded - server is working correctly');
        console.log('If you see this in browser console, the application is functional');
    </script>
</body>
</html>
