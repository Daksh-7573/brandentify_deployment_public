<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simplified Industry Pulse</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background-color: #f9fafb;
    }
    .pulse-card {
      border-radius: 0.5rem;
      overflow: hidden;
      transition: all 0.2s ease-in-out;
    }
    .pulse-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }
    .reaction-button {
      transition: all 0.2s ease;
    }
    .reaction-button:hover {
      background-color: #f3f4f6;
    }
    .card-container {
      max-width: 600px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    // Mock data
    const mockPulses = [
      {
        id: 1,
        title: "Exploring AI Integration in Cybersecurity",
        content: "Machine learning models are increasingly being used to detect and mitigate security threats in real-time. What's your company's approach to integrating AI in security protocols?",
        author: {
          name: "Alex Johnson",
          title: "Cybersecurity Specialist",
          photoURL: "https://randomuser.me/api/portraits/men/32.jpg"
        },
        createdAt: "2023-10-15T14:30:00Z",
        reactions: {
          insights: 24,
          useful: 18,
          inspiring: 12
        },
        commentCount: 8,
        hashtags: ["#cybersecurity", "#AIinnovation", "#threatdetection"]
      },
      {
        id: 2,
        title: "Remote Work Culture in 2023",
        content: "As we continue to adapt to hybrid work models, what strategies have you found effective for maintaining company culture and team cohesion?",
        author: {
          name: "Samantha Lee",
          title: "HR Director",
          photoURL: "https://randomuser.me/api/portraits/women/44.jpg"
        },
        createdAt: "2023-10-14T09:15:00Z",
        reactions: {
          insights: 31,
          useful: 27,
          inspiring: 19
        },
        commentCount: 15,
        hashtags: ["#remotework", "#companyculture", "#teambuilding"]
      },
      {
        id: 3,
        title: "Sustainable Tech Practices",
        content: "Our team recently implemented a carbon-neutral cloud strategy that reduced our environmental impact while actually cutting costs. What sustainable tech initiatives is your organization pursuing?",
        author: {
          name: "Michael Chen",
          title: "Sustainability Lead",
          photoURL: "https://randomuser.me/api/portraits/men/64.jpg"
        },
        createdAt: "2023-10-13T16:45:00Z",
        reactions: {
          insights: 42,
          useful: 35,
          inspiring: 28
        },
        commentCount: 23,
        hashtags: ["#sustainability", "#greentech", "#carbonneutral"]
      }
    ];

    function formatDate(dateString) {
      const options = { month: 'short', day: 'numeric' };
      return new Date(dateString).toLocaleDateString('en-US', options);
    }

    function PulseCard({ pulse }) {
      return (
        <div className="pulse-card bg-white shadow mb-4 overflow-hidden">
          <div className="p-4">
            {/* Author info */}
            <div className="flex items-center mb-3">
              <img 
                src={pulse.author.photoURL} 
                alt={pulse.author.name}
                className="w-10 h-10 rounded-full mr-3"
              />
              <div>
                <h3 className="font-medium text-gray-900">{pulse.author.name}</h3>
                <p className="text-sm text-gray-500">{pulse.author.title} • {formatDate(pulse.createdAt)}</p>
              </div>
            </div>
            
            {/* Content */}
            <h2 className="text-xl font-semibold mb-2">{pulse.title}</h2>
            <p className="text-gray-700 mb-3">{pulse.content}</p>
            
            {/* Hashtags */}
            <div className="flex flex-wrap mb-4">
              {pulse.hashtags.map((tag, index) => (
                <span 
                  key={index} 
                  className="text-blue-600 text-sm mr-2 hover:underline cursor-pointer"
                >
                  {tag}
                </span>
              ))}
            </div>
            
            {/* Reaction buttons */}
            <div className="flex justify-between items-center pt-3 border-t border-gray-100">
              <div className="flex space-x-2">
                <button className="reaction-button flex items-center px-2 py-1 rounded-md text-sm text-gray-700">
                  <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                  </svg>
                  <span>Insights ({pulse.reactions.insights})</span>
                </button>
                <button className="reaction-button flex items-center px-2 py-1 rounded-md text-sm text-gray-700">
                  <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5"></path>
                  </svg>
                  <span>Useful ({pulse.reactions.useful})</span>
                </button>
                <button className="reaction-button flex items-center px-2 py-1 rounded-md text-sm text-gray-700">
                  <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                  </svg>
                  <span>Inspiring ({pulse.reactions.inspiring})</span>
                </button>
              </div>
              
              <button className="flex items-center text-sm text-gray-700 reaction-button px-2 py-1 rounded-md">
                <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"></path>
                </svg>
                <span>Comment{pulse.commentCount !== 1 ? 's' : ''} ({pulse.commentCount})</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    function IndustryPulsePage() {
      return (
        <div className="min-h-screen bg-gray-50 py-8">
          <div className="container mx-auto px-4">
            <div className="flex justify-between items-center mb-6">
              <h1 className="text-2xl font-bold text-gray-900">Industry Pulse</h1>
              <button className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors">
                Create Pulse
              </button>
            </div>
            
            <div className="grid grid-cols-1 gap-4 card-container">
              {mockPulses.map(pulse => (
                <PulseCard key={pulse.id} pulse={pulse} />
              ))}
            </div>

            <div className="mt-8 text-center">
              <a href="/industry-pulse" className="text-blue-600 hover:text-blue-800 font-medium">
                Go to Full Industry Pulse Page
              </a>
              <p className="mt-2 text-gray-500 text-sm">
                (Note: You may encounter Firebase authentication issues when accessing the full page)
              </p>
            </div>
          </div>
        </div>
      );
    }
    
    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<IndustryPulsePage />);
  </script>
</body>
</html>
