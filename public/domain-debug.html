<!DOCTYPE html>
<html>
<head>
    <title>Brandentifier Domain Debug</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; margin: 40px; background: #1a1a1a; color: white; }
        .status { padding: 20px; margin: 10px 0; border-radius: 8px; }
        .success { background: #1a4a3a; border: 2px solid #2d7a5a; }
        .error { background: #4a1a1a; border: 2px solid #7a2d2d; }
        .info { background: #1a3a4a; border: 2px solid #2d5a7a; }
        code { background: #333; padding: 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🚀 Brandentifier Domain Debug</h1>
    <div id="tests">
        <div class="status info">Testing domain connection...</div>
    </div>
    
    <script>
        const testsDiv = document.getElementById('tests');
        
        async function runTests() {
            testsDiv.innerHTML = '<div class="status info">Running connectivity tests...</div>';
            
            const tests = [
                { name: 'API Health Check', url: '/api/health' },
                { name: 'User API', url: '/api/users' },
                { name: 'Static Files', url: '/favicon.ico' },
                { name: 'Main App', url: '/' }
            ];
            
            let results = [];
            
            for (const test of tests) {
                try {
                    const start = Date.now();
                    const response = await fetch(test.url, { method: 'HEAD' });
                    const duration = Date.now() - start;
                    
                    results.push({
                        name: test.name,
                        status: response.status,
                        success: response.ok,
                        duration: duration,
                        url: test.url
                    });
                } catch (error) {
                    results.push({
                        name: test.name,
                        status: 'ERROR',
                        success: false,
                        error: error.message,
                        url: test.url
                    });
                }
            }
            
            displayResults(results);
        }
        
        function displayResults(results) {
            const successCount = results.filter(r => r.success).length;
            const totalCount = results.length;
            
            let html = `
                <div class="status ${successCount === totalCount ? 'success' : 'error'}">
                    <h2>Test Results: ${successCount}/${totalCount} Passed</h2>
                </div>
            `;
            
            results.forEach(result => {
                const statusClass = result.success ? 'success' : 'error';
                const duration = result.duration ? ` (${result.duration}ms)` : '';
                const error = result.error ? `<br>Error: ${result.error}` : '';
                
                html += `
                    <div class="status ${statusClass}">
                        <strong>${result.name}</strong><br>
                        URL: <code>${result.url}</code><br>
                        Status: ${result.status}${duration}${error}
                    </div>
                `;
            });
            
            if (successCount === totalCount) {
                html += `
                    <div class="status success">
                        <h3>✅ All tests passed! Domain is working correctly.</h3>
                        <p><a href="/" style="color: #4a9eff;">Access the full Brandentifier application</a></p>
                        <p>Performance optimizations active:
                        <ul>
                            <li>Preconnect/Preload optimization</li>
                            <li>Firebase auth caching</li>
                            <li>Progressive rendering</li>
                            <li>Service Worker v2</li>
                        </ul>
                        </p>
                    </div>
                `;
            } else {
                html += `
                    <div class="status error">
                        <h3>⚠️ Some tests failed</h3>
                        <p>This may be a temporary connectivity issue. Try:</p>
                        <ul>
                            <li>Hard refresh (Ctrl+F5 or Cmd+Shift+R)</li>
                            <li>Clear browser cache</li>
                            <li>Try incognito/private browsing</li>
                            <li>Wait 2-3 minutes and refresh</li>
                        </ul>
                    </div>
                `;
            }
            
            testsDiv.innerHTML = html;
        }
        
        // Auto-run tests
        runTests();
        
        // Add refresh button
        setTimeout(() => {
            const refreshBtn = document.createElement('button');
            refreshBtn.textContent = '🔄 Run Tests Again';
            refreshBtn.style.cssText = 'padding:10px 20px; background:#2d5a7a; color:white; border:none; border-radius:5px; cursor:pointer; margin-top:20px;';
            refreshBtn.onclick = runTests;
            document.body.appendChild(refreshBtn);
        }, 2000);
    </script>
</body>
</html>
