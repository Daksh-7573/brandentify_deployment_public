<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Authentication Proxy</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      background-color: #f9fafb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .loading {
      text-align: center;
      padding: 20px;
    }
    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #09f;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    iframe {
      border: none;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    .error {
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
      background: #fee2e2;
      border: 1px solid #ef4444;
      border-radius: 8px;
      color: #7f1d1d;
    }
    .instructions {
      padding: 10px 20px;
      margin-top: 20px;
      background: #f3f4f6;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Establishing secure connection to Google authentication services...</p>
      <p><small>This may take a few moments</small></p>
    </div>
  </div>

  <script>
    (function() {
      // Get the Firebase project ID from the query parameters or localStorage
      const urlParams = new URLSearchParams(window.location.search);
      const projectId = urlParams.get('projectId') || localStorage.getItem('firebase_project_id');
      const apiKey = urlParams.get('apiKey') || localStorage.getItem('firebase_api_key');
      const redirectUrl = urlParams.get('redirect') || window.location.origin + '/auth-callback';
      
      // Store these for future use
      if (projectId) localStorage.setItem('firebase_project_id', projectId);
      if (apiKey) localStorage.setItem('firebase_api_key', apiKey);
      
      const container = document.getElementById('container');
      const loading = document.getElementById('loading');
      
      function showError(message) {
        loading.style.display = 'none';
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error';
        errorDiv.innerHTML = `
          <h3>Authentication Error</h3>
          <p>${message}</p>
          <p>Please try again or contact support.</p>
          <button onclick="window.close()">Close Window</button>
        `;
        container.appendChild(errorDiv);
      }
      
      function showInstructions() {
        const instructionsDiv = document.createElement('div');
        instructionsDiv.className = 'instructions';
        instructionsDiv.innerHTML = `
          <p><strong>If the Google login page doesn't appear:</strong></p>
          <ul>
            <li>Check your browser's popup settings</li>
            <li>Disable any popup blockers for this site</li>
            <li>Try using a different browser</li>
          </ul>
        `;
        container.appendChild(instructionsDiv);
      }
      
      try {
        // Make sure we have the required parameters
        if (!projectId || !apiKey) {
          throw new Error('Missing required Firebase configuration. Please check your setup.');
        }
        
        // Create the auth URL
        const authDomain = `${projectId}.firebaseapp.com`;
        const googleAuthUrl = `https://${authDomain}/__/auth/handler?apiKey=${apiKey}&authType=signInWithRedirect&providerId=google.com&scopes=email,profile&redirectUrl=${encodeURIComponent(redirectUrl)}`;
        
        // Create an iframe to load Google Auth
        const iframe = document.createElement('iframe');
        iframe.src = googleAuthUrl;
        iframe.onload = function() {
          // Hide loading when iframe is loaded
          loading.style.display = 'none';
        };
        iframe.onerror = function() {
          showError('Failed to load authentication page. Google authentication might be blocked by your browser.');
          showInstructions();
        };
        
        // Add the iframe to the page
        document.body.appendChild(iframe);
        
        // Show instructions after a delay
        setTimeout(showInstructions, 3000);
      } catch (error) {
        showError(error.message || 'An unexpected error occurred.');
        console.error('Authentication proxy error:', error);
      }
    })();
  </script>
</body>
</html>
