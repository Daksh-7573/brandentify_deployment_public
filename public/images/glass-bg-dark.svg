<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark gradient background -->
  <rect width="1920" height="1080" fill="url(#dark_gradient)" />
  
  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <path d="M0 0h1920v1080H0z" fill="url(#grid_pattern)" />
  </g>
  
  <!-- Abstract glowing elements -->
  <g filter="url(#glow1)">
    <ellipse cx="400" cy="300" rx="300" ry="250" fill="#0066FF" fill-opacity="0.08" />
  </g>
  
  <g filter="url(#glow2)">
    <ellipse cx="1200" cy="800" rx="400" ry="300" fill="#6600CC" fill-opacity="0.07" />
  </g>
  
  <g filter="url(#glow3)">
    <ellipse cx="1600" cy="200" rx="250" ry="200" fill="#00CCFF" fill-opacity="0.06" />
  </g>
  
  <g filter="url(#glow4)">
    <ellipse cx="800" cy="900" rx="350" ry="200" fill="#3300FF" fill-opacity="0.05" />
  </g>
  
  <!-- Hazy atmosphere particles -->
  <g opacity="0.2">
    <path d="M0 0h1920v1080H0z" fill="url(#noise_pattern)" />
  </g>
  
  <!-- Definitions -->
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="dark_gradient" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0F1F" />
      <stop offset="0.5" stop-color="#111827" />
      <stop offset="1" stop-color="#060B16" />
    </linearGradient>
    
    <!-- Grid pattern -->
    <pattern id="grid_pattern" patternUnits="userSpaceOnUse" width="40" height="40" patternTransform="scale(2) rotate(45)">
      <path d="M0 0L40 0M0 0L0 40" stroke="white" stroke-width="0.3" />
    </pattern>
    
    <!-- Noise pattern to add texture -->
    <pattern id="noise_pattern" patternUnits="userSpaceOnUse" width="200" height="200">
      <filter id="noise">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      </filter>
      <rect width="200" height="200" filter="url(#noise)" opacity="0.1" />
    </pattern>
    
    <!-- Glow effects -->
    <filter id="glow1" x="0" y="0" width="800" height="600" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="50" result="effect1_foregroundBlur"/>
    </filter>
    
    <filter id="glow2" x="700" y="400" width="1000" height="800" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="50" result="effect1_foregroundBlur"/>
    </filter>
    
    <filter id="glow3" x="1250" y="0" width="700" height="500" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="50" result="effect1_foregroundBlur"/>
    </filter>
    
    <filter id="glow4" x="350" y="650" width="900" height="500" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="50" result="effect1_foregroundBlur"/>
    </filter>
  </defs>
</svg>