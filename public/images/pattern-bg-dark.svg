<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="gradient1" cx="30%" cy="30%" r="70%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#BB6DFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#BB6DFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gradient2" cx="70%" cy="60%" r="80%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#52B5F9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#52B5F9" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="30" />
    </filter>
    <pattern id="pattern1" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="rgba(255, 255, 255, 0.15)" />
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#0A0F1F" />
  <rect width="100%" height="100%" fill="url(#pattern1)" />
  <g filter="url(#blur)">
    <circle cx="400" cy="300" r="300" fill="url(#gradient1)" />
    <circle cx="1200" cy="700" r="400" fill="url(#gradient2)" />
    <circle cx="900" cy="200" r="200" fill="#BB6DFF" opacity="0.15" />
    <circle cx="1600" cy="300" r="250" fill="#52B5F9" opacity="0.10" />
    <circle cx="300" cy="800" r="280" fill="#667FFF" opacity="0.15" />
  </g>
</svg>