apiVersion: v1
kind: ConfigMap
metadata:
  name: istio-config
  namespace: brandentifier
data:
  mesh-config.yaml: |
    defaultConfig:
      proxyStatsMatcher:
        inclusionRegexps:
        - ".*circuit_breakers.*"
        - ".*upstream_rq_retry.*"
        - ".*_cx_.*"
    extensionProviders:
    - name: otel
      envoyOtelAls:
        service: opentelemetry-collector.istio-system.svc.cluster.local
        port: 4317
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: brandentifier-gateway
  namespace: brandentifier
spec:
  hosts:
  - brandentifier.local
  gateways:
  - brandentifier-gateway
  http:
  - match:
    - uri:
        prefix: /api/users
    route:
    - destination:
        host: user-service
        port:
          number: 3001
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
  - match:
    - uri:
        prefix: /api/projects
    route:
    - destination:
        host: project-service
        port:
          number: 3002
    timeout: 60s
    retries:
      attempts: 2
      perTryTimeout: 30s
  - match:
    - uri:
        prefix: /api/ai
    route:
    - destination:
        host: ai-service
        port:
          number: 3003
    timeout: 120s
    retries:
      attempts: 1
      perTryTimeout: 60s
  - match:
    - uri:
        prefix: /api/messaging
    route:
    - destination:
        host: messaging-service
        port:
          number: 3004
    timeout: 15s
    retries:
      attempts: 3
      perTryTimeout: 5s
  - match:
    - uri:
        prefix: /api/
    route:
    - destination:
        host: brandentifier-service
        port:
          number: 5000
    timeout: 30s
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: brandentifier-circuit-breaker
  namespace: brandentifier
spec:
  host: "*.brandentifier.svc.cluster.local"
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        maxRequestsPerConnection: 2
    circuitBreaker:
      consecutiveErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    loadBalancer:
      simple: LEAST_CONN
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: brandentifier
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: brandentifier-authz
  namespace: brandentifier
spec:
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/brandentifier/sa/brandentifier-service-account"]
  - to:
    - operation:
        methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
        paths: ["/api/*"]
  - when:
    - key: request.headers[authorization]
      notValues: [""]
---
apiVersion: telemetry.istio.io/v1alpha1
kind: Telemetry
metadata:
  name: brandentifier-metrics
  namespace: brandentifier
spec:
  metrics:
  - providers:
    - name: prometheus
  - overrides:
    - match:
        metric: ALL_METRICS
      tagOverrides:
        destination_service_name:
          value: "%{DESTINATION_SERVICE_NAME | 'unknown'}"
        source_app:
          value: "%{SOURCE_APP | 'unknown'}"
---
apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: brandentifier-control-plane
spec:
  values:
    global:
      meshID: mesh1
      multiCluster:
        clusterName: brandentifier-cluster
      network: network1
  components:
    pilot:
      k8s:
        resources:
          requests:
            cpu: 200m
            memory: 128Mi
        hpaSpec:
          maxReplicas: 5
          minReplicas: 1
          scaleTargetRef:
            apiVersion: apps/v1
            kind: Deployment
            name: istiod
          targetCPUUtilizationPercentage: 80
    ingressGateways:
    - name: istio-ingressgateway
      enabled: true
      k8s:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
        service:
          type: LoadBalancer
          ports:
          - port: 15021
            targetPort: 15021
            name: status-port
          - port: 80
            targetPort: 8080
            name: http2
          - port: 443
            targetPort: 8443
            name: https