<!DOCTYPE html>
<html>
<head>
    <title>Auth Fix Tool</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { 
            max-width: 500px; 
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #2d3748; margin-bottom: 20px; font-size: 24px; }
        .status { 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 8px; 
            font-weight: 500;
        }
        .success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }
        .warning { background: #fff3cd; color: #856404; border-left: 4px solid #ffc107; }
        button { 
            width: 100%; 
            padding: 15px; 
            font-size: 16px; 
            font-weight: bold; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            margin: 10px 0;
            transition: all 0.2s;
        }
        .fix-btn { 
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
        }
        .fix-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(40, 167, 69, 0.4); }
        .access-btn { 
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
        }
        .access-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0, 123, 255, 0.4); }
        #current-status { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 8px; 
            font-family: monospace; 
            font-size: 12px; 
            margin: 15px 0;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Authentication Fix Tool</h1>
        
        <div id="current-status">
            <strong>Current Status:</strong><br>
            Redirect Attempt: <span id="redirect-status">checking...</span><br>
            Auth Success: <span id="auth-status">checking...</span><br>
            Time: <span id="time-status">checking...</span>
        </div>
        
        <button onclick="fixAuth()" class="fix-btn">Fix Authentication Issue</button>
        <button onclick="goToPulse()" class="access-btn">Go to Industry Pulse</button>
        
        <div id="results"></div>
    </div>

    <script>
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }

        function checkStatus() {
            const redirectAttempt = sessionStorage.getItem('redirect_auth_attempt') === 'true';
            const authSuccess = sessionStorage.getItem('authSuccess') === 'true';
            const redirectTime = sessionStorage.getItem('redirect_auth_time');
            
            document.getElementById('redirect-status').textContent = redirectAttempt ? 'TRUE (STUCK)' : 'false';
            document.getElementById('auth-status').textContent = authSuccess ? 'true' : 'FALSE';
            document.getElementById('time-status').textContent = redirectTime || 'none';
            
            if (redirectAttempt && !authSuccess) {
                addResult("⚠️ FOUND THE PROBLEM: Stuck redirect attempt without success", "warning");
                addResult("Click 'Fix Authentication Issue' to clear this", "info");
            }
        }

        function fixAuth() {
            addResult("🔧 Fixing stuck authentication...", "info");
            
            let fixed = [];
            
            // Clear the exact stuck flags
            if (sessionStorage.getItem('redirect_auth_attempt')) {
                sessionStorage.removeItem('redirect_auth_attempt');
                fixed.push('redirect_auth_attempt');
            }
            
            if (sessionStorage.getItem('redirect_auth_time')) {
                sessionStorage.removeItem('redirect_auth_time');
                fixed.push('redirect_auth_time');
            }
            
            if (localStorage.getItem('redirect_auth_attempt')) {
                localStorage.removeItem('redirect_auth_attempt');
                fixed.push('redirect_auth_attempt (local)');
            }
            
            if (localStorage.getItem('redirect_auth_time')) {
                localStorage.removeItem('redirect_auth_time');
                fixed.push('redirect_auth_time (local)');
            }
            
            // Clear other auth flags
            ['authSuccess', 'redirect_auth_success', 'auth_return_url'].forEach(key => {
                if (sessionStorage.getItem(key)) {
                    sessionStorage.removeItem(key);
                    fixed.push(key);
                }
                if (localStorage.getItem(key)) {
                    localStorage.removeItem(key);
                    fixed.push(key + ' (local)');
                }
            });
            
            addResult(`✅ FIXED: Cleared ${fixed.length} stuck flags: ${fixed.join(', ')}`, "success");
            addResult("Authentication system is now reset", "success");
            addResult("You can now try Google login again", "info");
            
            checkStatus();
        }
        
        function goToPulse() {
            addResult("🚀 Setting up access to Industry Pulse...", "info");
            fixAuth();
            localStorage.setItem('emergency_access', 'true');
            window.location.href = '/industry-pulse';
        }
        
        // Auto-check on load
        window.addEventListener('load', () => {
            checkStatus();
        });
    </script>
</body>
</html>
