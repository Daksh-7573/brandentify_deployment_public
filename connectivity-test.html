<!DOCTYPE html>
<html>
<head>
    <title>Google OAuth Connectivity Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; }
        .warning { background: #fff3cd; border: 1px solid #ffeaa7; }
        button { padding: 10px 20px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Google OAuth Connectivity Test</h1>
    <div id="results">Testing connectivity...</div>
    
    <button onclick="testDirectGoogleAuth()">Test Direct Google Auth</button>
    <button onclick="testFirebaseConnectivity()">Test Firebase Connectivity</button>
    <button onclick="testBrowserCompatibility()">Test Browser Compatibility</button>

    <script type="module">
        function addResult(message, type = 'status') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            document.getElementById('results').appendChild(div);
            console.log(message);
        }

        // Test 1: Check if we can reach Google's OAuth endpoints
        async function testGoogleOAuthEndpoints() {
            addResult("Testing Google OAuth endpoints...", "warning");
            
            try {
                // Test Google's discovery document
                const response = await fetch('https://accounts.google.com/.well-known/openid_configuration');
                if (response.ok) {
                    const config = await response.json();
                    addResult(`✅ Google OAuth discovery endpoint accessible`, "success");
                    addResult(`Authorization endpoint: ${config.authorization_endpoint}`, "success");
                    return true;
                } else {
                    addResult(`❌ Cannot reach Google OAuth endpoints (${response.status})`, "error");
                    return false;
                }
            } catch (error) {
                addResult(`❌ Network error reaching Google: ${error.message}`, "error");
                return false;
            }
        }

        // Test 2: Firebase connectivity
        async function testFirebaseServices() {
            addResult("Testing Firebase services...", "warning");
            
            try {
                // Test Firebase Auth service
                const response = await fetch('https://identitytoolkit.googleapis.com/v1/projects/brandentifier-app');
                addResult(`Firebase Auth service response: ${response.status}`, response.ok ? "success" : "warning");
                
                // Test if Firebase can be loaded
                const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js');
                const { getAuth } = await import('https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js');
                
                const app = initializeApp({
                    apiKey: "test-key",
                    authDomain: "brandentifier-app.firebaseapp.com",
                    projectId: "brandentifier-app"
                });
                
                addResult("✅ Firebase SDK loads successfully", "success");
                return true;
            } catch (error) {
                addResult(`❌ Firebase service error: ${error.message}`, "error");
                return false;
            }
        }

        // Test 3: Browser compatibility
        function testBrowserFeatures() {
            addResult("Testing browser compatibility...", "warning");
            
            const features = {
                'localStorage': typeof Storage !== "undefined",
                'sessionStorage': typeof sessionStorage !== "undefined",
                'fetch': typeof fetch !== "undefined",
                'Promise': typeof Promise !== "undefined",
                'URL': typeof URL !== "undefined",
                'WebSocket': typeof WebSocket !== "undefined",
                'postMessage': typeof window.postMessage !== "undefined"
            };

            let allSupported = true;
            for (const [feature, supported] of Object.entries(features)) {
                if (supported) {
                    addResult(`✅ ${feature} supported`, "success");
                } else {
                    addResult(`❌ ${feature} NOT supported`, "error");
                    allSupported = false;
                }
            }

            // Test third-party cookies (important for OAuth)
            try {
                document.cookie = "test=1; SameSite=None; Secure";
                const cookieSupported = document.cookie.includes("test=1");
                addResult(`Third-party cookies: ${cookieSupported ? 'Supported' : 'Blocked'}`, 
                         cookieSupported ? "success" : "warning");
            } catch (error) {
                addResult("❌ Cookie test failed", "error");
            }

            return allSupported;
        }

        // Test 4: Network policies and CORS
        async function testNetworkPolicies() {
            addResult("Testing network policies...", "warning");
            
            try {
                // Test if we can make cross-origin requests
                const testUrls = [
                    'https://accounts.google.com/favicon.ico',
                    'https://www.googleapis.com/oauth2/v1/userinfo',
                    'https://securetoken.googleapis.com/v1/token'
                ];

                for (const url of testUrls) {
                    try {
                        const response = await fetch(url, { mode: 'no-cors' });
                        addResult(`✅ Can reach ${new URL(url).hostname}`, "success");
                    } catch (error) {
                        addResult(`❌ Cannot reach ${new URL(url).hostname}: ${error.message}`, "error");
                    }
                }
            } catch (error) {
                addResult(`❌ Network policy test failed: ${error.message}`, "error");
            }
        }

        // Main connectivity test
        async function runConnectivityTests() {
            addResult("🔧 Starting comprehensive connectivity tests...", "warning");
            
            const results = {
                google: await testGoogleOAuthEndpoints(),
                firebase: await testFirebaseServices(),
                browser: testBrowserFeatures()
            };
            
            await testNetworkPolicies();
            
            addResult("", "status");
            if (results.google && results.firebase && results.browser) {
                addResult("🎉 All connectivity tests passed! OAuth should work.", "success");
                addResult("If authentication still fails, the issue is likely in the redirect handling logic.", "warning");
            } else {
                addResult("❌ Some connectivity issues detected. This may explain authentication failures.", "error");
            }
        }

        // Global functions for buttons
        window.testDirectGoogleAuth = async function() {
            addResult("Testing direct Google authentication...", "warning");
            
            try {
                // Attempt to create a Google OAuth URL manually
                const params = new URLSearchParams({
                    'client_id': 'your-client-id', // This would normally come from Firebase config
                    'redirect_uri': window.location.origin,
                    'response_type': 'code',
                    'scope': 'openid email profile',
                    'state': 'test-state'
                });
                
                const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
                addResult(`Google OAuth URL would be: ${authUrl}`, "success");
                addResult("✅ Google OAuth URL generation works", "success");
                
            } catch (error) {
                addResult(`❌ Google OAuth test failed: ${error.message}`, "error");
            }
        };

        window.testFirebaseConnectivity = async function() {
            await testFirebaseServices();
        };

        window.testBrowserCompatibility = function() {
            testBrowserFeatures();
        };

        // Auto-run tests on page load
        runConnectivityTests();
    </script>
</body>
</html>
