<!DOCTYPE html>
<html>
<head>
    <title>Brandentifier Connectivity Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Brandentifier Performance Test</h1>
    <div id="status">Testing connectivity...</div>
    
    <script>
        async function testConnectivity() {
            const status = document.getElementById('status');
            
            try {
                // Test if we can reach the API
                const response = await fetch('/api/users', {
                    method: 'HEAD',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (response.ok) {
                    status.className = 'status success';
                    status.innerHTML = `
                        <h2>✅ Server is running correctly!</h2>
                        <p>API responded with status: ${response.status}</p>
                        <p>All performance optimizations are active:</p>
                        <ul>
                            <li>Preconnect/Preload optimization</li>
                            <li>Firebase auth caching</li>
                            <li>Progressive rendering</li>
                            <li>Service Worker v2</li>
                        </ul>
                        <p><a href="/">Access the full application</a></p>
                    `;
                } else {
                    throw new Error(`Server responded with ${response.status}`);
                }
            } catch (error) {
                status.className = 'status error';
                status.innerHTML = `
                    <h2>❌ Connection Issue</h2>
                    <p>Error: ${error.message}</p>
                    <p>This appears to be a temporary infrastructure issue.</p>
                    <p>Try refreshing the page or opening in a new tab.</p>
                `;
            }
        }
        
        testConnectivity();
    </script>
</body>
</html>
