<!DOCTYPE html>
<html>
<head>
    <title>Auth Redirect Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .status { background: #f8f9fa; border-left: 4px solid #007cba; padding: 15px; margin: 15px 0; }
        .success { border-left-color: #28a745; }
        .error { border-left-color: #dc3545; }
        .warning { border-left-color: #ffc107; }
        button { background: #4285f4; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; margin: 10px 0; }
        .code { background: #f8f9fa; border: 1px solid #e9ecef; padding: 10px; font-family: monospace; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Authentication Redirect Flow Debug</h1>
        <div id="status">Starting redirect flow analysis...</div>
        
        <h3>Current Page Analysis</h3>
        <div class="code" id="pageInfo">Loading...</div>
        
        <h3>Session Storage Debug</h3>
        <div class="code" id="sessionInfo">Loading...</div>
        
        <h3>Firebase Auth State</h3>
        <div class="code" id="authInfo">Loading...</div>
        
        <button id="testAuth">Test Authentication</button>
        <button id="clearSession">Clear Session Data</button>
        <button id="forceRedirect">Force Redirect to Industry Pulse</button>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getAuth, getRedirectResult, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        
        const statusDiv = document.getElementById('status');
        
        function addStatus(message, type = 'status') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            statusDiv.appendChild(div);
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        // Display current page information
        document.getElementById('pageInfo').innerHTML = `
URL: ${window.location.href}
Pathname: ${window.location.pathname}
Search: ${window.location.search}
Hash: ${window.location.hash}
Referrer: ${document.referrer}
        `;
        
        // Display session storage
        function updateSessionInfo() {
            const sessionData = {};
            for (let i = 0; i < sessionStorage.length; i++) {
                const key = sessionStorage.key(i);
                sessionData[key] = sessionStorage.getItem(key);
            }
            
            document.getElementById('sessionInfo').innerHTML = `
Session Storage:
${JSON.stringify(sessionData, null, 2)}

Local Storage:
${JSON.stringify(localStorage, null, 2)}
            `;
        }
        
        updateSessionInfo();
        
        try {
            // Initialize Firebase with environment variables
            const firebaseConfig = {
                apiKey: "AIzaSyABCDEF...", // Will be loaded from environment
                authDomain: "brandentifier-app.firebaseapp.com",
                projectId: "brandentifier-app",
                storageBucket: "brandentifier-app.firebasestorage.app",
                messagingSenderId: "364932947264",
                appId: "1:364932947264:web:..."
            };
            
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            
            // Check authentication state
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('authInfo').innerHTML = `
✅ User Authenticated:
Email: ${user.email}
UID: ${user.uid}
Display Name: ${user.displayName || 'Not provided'}
Email Verified: ${user.emailVerified}
                    `;
                    addStatus(`User is authenticated: ${user.email}`, "success");
                    
                    // Check why we're not redirecting
                    if (window.location.pathname === '/auth' || window.location.pathname === '/') {
                        addStatus("User is authenticated but still on auth page - redirect not working", "error");
                    }
                } else {
                    document.getElementById('authInfo').innerHTML = "❌ No user authenticated";
                    addStatus("No user authenticated", "warning");
                }
            });
            
            // Check for redirect result
            getRedirectResult(auth).then((result) => {
                if (result) {
                    addStatus(`Redirect result found: ${result.user.email}`, "success");
                } else {
                    addStatus("No redirect result found", "warning");
                }
            }).catch((error) => {
                addStatus(`Redirect result error: ${error.message}`, "error");
            });
            
        } catch (error) {
            addStatus(`Firebase initialization error: ${error.message}`, "error");
        }
        
        // Button handlers
        document.getElementById('testAuth').onclick = () => {
            window.location.href = '/auth';
        };
        
        document.getElementById('clearSession').onclick = () => {
            sessionStorage.clear();
            localStorage.clear();
            addStatus("Storage cleared", "success");
            updateSessionInfo();
        };
        
        document.getElementById('forceRedirect').onclick = () => {
            addStatus("Forcing redirect to industry pulse...", "warning");
            window.location.href = '/industry-pulse';
        };
        
        addStatus("Debug page loaded", "success");
    </script>
</body>
</html>
