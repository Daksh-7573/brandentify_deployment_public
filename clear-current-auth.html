<!DOCTYPE html>
<html>
<head>
    <title>Clear Current Auth Issue</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; margin-bottom: 20px; }
        .status { padding: 15px; margin: 10px 0; border-radius: 5px; font-weight: bold; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        button { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; margin: 10px 0; }
        .clear-btn { background: #007bff; color: white; }
        .clear-btn:hover { background: #0056b3; }
        .access-btn { background: #28a745; color: white; }
        .access-btn:hover { background: #1e7e34; }
        #debug-info { font-family: monospace; background: #f8f9fa; padding: 15px; border-radius: 5px; margin: 15px 0; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Clear Stuck Auth Data</h1>
        
        <div id="debug-info">
            <strong>Current Auth Status:</strong><br>
            Redirect Attempt: <span id="redirect-attempt">checking...</span><br>
            Redirect Time: <span id="redirect-time">checking...</span><br>
            Auth Success: <span id="auth-success">checking...</span><br>
        </div>
        
        <button onclick="clearStuckAuth()" class="clear-btn">Clear Stuck Authentication</button>
        <button onclick="directToPulse()" class="access-btn">Go to Industry Pulse Directly</button>
        
        <div id="results"></div>
    </div>

    <script>
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }

        function checkCurrentAuth() {
            document.getElementById('redirect-attempt').textContent = sessionStorage.getItem('redirect_auth_attempt') || 'false';
            document.getElementById('redirect-time').textContent = sessionStorage.getItem('redirect_auth_time') || 'none';
            document.getElementById('auth-success').textContent = sessionStorage.getItem('authSuccess') || 'false';
        }

        function clearStuckAuth() {
            addResult("Clearing stuck authentication data...", "info");
            
            let cleared = [];
            
            // Clear the specific stuck flags
            if (sessionStorage.getItem('redirect_auth_attempt')) {
                sessionStorage.removeItem('redirect_auth_attempt');
                cleared.push('redirect_auth_attempt (session)');
            }
            
            if (sessionStorage.getItem('redirect_auth_time')) {
                sessionStorage.removeItem('redirect_auth_time');
                cleared.push('redirect_auth_time (session)');
            }
            
            if (localStorage.getItem('redirect_auth_attempt')) {
                localStorage.removeItem('redirect_auth_attempt');
                cleared.push('redirect_auth_attempt (local)');
            }
            
            if (localStorage.getItem('redirect_auth_time')) {
                localStorage.removeItem('redirect_auth_time');
                cleared.push('redirect_auth_time (local)');
            }
            
            if (sessionStorage.getItem('authSuccess')) {
                sessionStorage.removeItem('authSuccess');
                cleared.push('authSuccess (session)');
            }
            
            if (localStorage.getItem('authSuccess')) {
                localStorage.removeItem('authSuccess');
                cleared.push('authSuccess (local)');
            }
            
            // Clear any additional auth flags
            ['redirect_auth_success', 'auth_return_url', 'emergency_access', 'bypass_auth'].forEach(key => {
                if (sessionStorage.getItem(key)) {
                    sessionStorage.removeItem(key);
                    cleared.push(key + ' (session)');
                }
                if (localStorage.getItem(key)) {
                    localStorage.removeItem(key);
                    cleared.push(key + ' (local)');
                }
            });
            
            if (cleared.length > 0) {
                addResult(`Cleared ${cleared.length} stuck auth flags: ${cleared.join(', ')}`, "success");
                addResult("Authentication system should now be in a clean state", "success");
                addResult("You can now try the Google login button again", "info");
            } else {
                addResult("No stuck auth flags found", "warning");
            }
            
            checkCurrentAuth();
        }
        
        function directToPulse() {
            addResult("Setting up direct access and redirecting...", "info");
            clearStuckAuth();
            localStorage.setItem('emergency_access', 'true');
            setTimeout(() => {
                window.location.href = '/industry-pulse';
            }, 500);
        }
        
        // Check auth status on load
        window.addEventListener('load', () => {
            checkCurrentAuth();
            addResult("Auth cleaner loaded. Click 'Clear Stuck Authentication' to resolve the issue.", "info");
        });
    </script>
</body>
</html>
