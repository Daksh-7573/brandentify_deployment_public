<!DOCTYPE html>
<html>
<head>
    <title>Simple Auth Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-box { background: #f5f5f5; border: 1px solid #ddd; padding: 15px; margin: 10px 0; }
        .success { color: green; }
        .error { color: red; }
        .warning { color: orange; }
    </style>
</head>
<body>
    <h1>Firebase Auth Debug - Simple Test</h1>
    <div id="status">Loading...</div>
    
    <script type="module">
        console.log("🔧 Starting simple Firebase auth debug...");
        
        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        
        const statusDiv = document.getElementById('status');
        
        function addStatus(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `debug-box ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            statusDiv.appendChild(div);
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        try {
            // Initialize Firebase with your config
            const firebaseConfig = {
                apiKey: "AIzaSyDK_JkoQ6wVUNhQjYTtJF0xXVXOQFOHs9Q",
                authDomain: "brandentifier-app.firebaseapp.com",
                projectId: "brandentifier-app",
                storageBucket: "brandentifier-app.firebasestorage.app",
                messagingSenderId: "364932947264",
                appId: "1:364932947264:web:8b5d7c1d3f0e4a8c8f9b3e"
            };
            
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const provider = new GoogleAuthProvider();
            
            addStatus("Firebase initialized successfully", "success");
            addStatus(`Current domain: ${window.location.hostname}`, "info");
            
            // Check for redirect result first
            addStatus("Checking for redirect result...", "info");
            
            try {
                const result = await getRedirectResult(auth);
                if (result) {
                    addStatus(`✅ REDIRECT SUCCESS: User ${result.user.email} authenticated`, "success");
                    addStatus(`User ID: ${result.user.uid}`, "success");
                    addStatus(`Display Name: ${result.user.displayName}`, "success");
                    
                    // This should redirect to industry pulse
                    addStatus("🚀 Authentication successful! Should redirect to industry pulse...", "success");
                    setTimeout(() => {
                        window.location.href = '/industry-pulse';
                    }, 2000);
                } else {
                    addStatus("No redirect result found", "warning");
                }
            } catch (error) {
                addStatus(`❌ Redirect error: ${error.message}`, "error");
            }
            
            // Set up auth state listener
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    addStatus(`✅ User is signed in: ${user.email}`, "success");
                } else {
                    addStatus("❌ No user signed in", "warning");
                }
            });
            
            // Add test button
            const button = document.createElement('button');
            button.textContent = 'Test Google Sign In';
            button.style.cssText = 'padding: 10px 20px; font-size: 16px; margin: 20px 0; background: #4285f4; color: white; border: none; border-radius: 5px; cursor: pointer;';
            button.onclick = async () => {
                try {
                    addStatus("🚀 Starting Google sign in with redirect...", "info");
                    
                    // Set provider parameters
                    provider.setCustomParameters({
                        prompt: 'select_account'
                    });
                    
                    await signInWithRedirect(auth, provider);
                    addStatus("Redirect initiated...", "info");
                } catch (error) {
                    addStatus(`❌ Sign in error: ${error.message}`, "error");
                }
            };
            
            statusDiv.appendChild(button);
            
        } catch (error) {
            addStatus(`❌ Firebase initialization error: ${error.message}`, "error");
        }
    </script>
</body>
</html>
